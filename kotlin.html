<!DOCTYPE html>
<html>
<head>
<title>AdiXfusion Kotlin Lab</title>

<style>

body{
background:#020617;
font-family:monospace;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#38bdf8;
}

.laptop{
width:95%;
max-width:800px;
margin:auto;
background:#111827;
border-radius:15px;
padding:20px;
box-shadow:0px 0px 30px black;
}

textarea{
width:100%;
height:220px;
background:black;
color:#00ff9d;
border:none;
padding:15px;
font-size:16px;
border-radius:10px;
}

.keyboard{
margin-top:10px;
}

.keyboard button{
margin:4px;
padding:8px 12px;
background:#1e293b;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.run{
background:#22c55e;
color:black;
font-weight:bold;
padding:10px 20px;
margin-top:10px;
border-radius:8px;
}

.output{
margin-top:15px;
background:black;
color:#facc15;
padding:15px;
min-height:40px;
border-radius:8px;
}

</style>
</head>

<body>

<h1>AdiXfusion Kotlin Coding Lab</h1>

<div class="laptop">

<textarea id="code">
// Kotlin Example
println("Hello Adi Sir")
</textarea>

<div class="keyboard">

<button onclick="addCode('println()')">println()</button>
<button onclick="addCode('fun ')">fun</button>
<button onclick="addCode('val ')">val</button>
<button onclick="addCode('var ')">var</button>
<button onclick="addCode('if(){}')">if</button>
<button onclick="addCode('for(){}')">for</button>

</div>

<button class="run" onclick="runCode()">Run Code</button>

<div class="output" id="output">
Output will show here
</div>

</div>

<script>

function addCode(text){
let editor=document.getElementById("code");
editor.value+=text;
}

function runCode(){

let code=document.getElementById("code").value;

if(code.includes("println")){

let match=code.match(/"(.*?)"/);

if(match){
document.getElementById("output").innerText=match[1];
}
else{
document.getElementById("output").innerText="Code Executed";
}

}
else{

document.getElementById("output").innerText="No output";

}

}

</script>

</body>
</html>
