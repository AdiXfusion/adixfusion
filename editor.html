<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Coding IDE</title>

<style>

body{
margin:0;
background:#0d1117;
color:white;
font-family:monospace;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#161b22;
padding:10px;
text-align:center;
font-size:18px;
}

textarea{
flex:1;
background:#0d1117;
color:#00ff9c;
border:none;
outline:none;
padding:12px;
font-size:14px;
resize:none;
}

.keys{
display:flex;
overflow-x:auto;
background:#161b22;
padding:5px;
}

.key{
min-width:40px;
text-align:center;
padding:8px;
margin:3px;
background:#30363d;
border-radius:5px;
cursor:pointer;
}

.key:active{
background:red;
}

.run{
padding:12px;
background:#ff0033;
border:none;
color:white;
font-size:16px;
}

iframe{
height:40%;
border:none;
background:white;
}

</style>

</head>

<body>

<div class="header">💻 Mobile Coding IDE</div>

<textarea id="code" placeholder="Write your code here..."></textarea>

<div class="keys">

<div class="key" onclick="add('<')">&lt;</div>
<div class="key" onclick="add('>')">&gt;</div>
<div class="key" onclick="add('/')">/</div>
<div class="key" onclick="add('{')">{</div>
<div class="key" onclick="add('}')">}</div>
<div class="key" onclick="add('(')">(</div>
<div class="key" onclick="add(')')">)</div>
<div class="key" onclick="add(';')">;</div>
<div class="key" onclick="add('=')">=</div>
<div class="key" onclick="add('+')">+</div>
<div class="key" onclick="add('-')">-</div>
<div class="key" onclick="add('*')">*</div>
<div class="key" onclick="add('"')">"</div>
<div class="key" onclick="add(''' )">'</div>

</div>

<button class="run" onclick="run()">▶ Run Code</button>

<iframe id="output"></iframe>

<script>

function add(symbol){

let textarea=document.getElementById("code");

let start=textarea.selectionStart;
let end=textarea.selectionEnd;

textarea.value=
textarea.value.substring(0,start)
+symbol+
textarea.value.substring(end);

textarea.focus();

textarea.selectionStart=start+1;
textarea.selectionEnd=start+1;

}

function run(){

let code=document.getElementById("code").value;

let iframe=document.getElementById("output").contentWindow.document;

iframe.open();
iframe.write(code);
iframe.close();

}

</script>

</body>
</html>
