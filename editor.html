<!DOCTYPE html>
<html>
<head>
<title>AdiXfusion Code Editor</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#38bdf8;
}

textarea{
width:90%;
height:200px;
border-radius:8px;
padding:10px;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#38bdf8;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

iframe{
width:90%;
height:300px;
background:white;
margin-top:20px;
border-radius:8px;
}
</style>

</head>

<body>

<h1>AdiXfusion Live Code Editor</h1>

<textarea id="code">
<h2>Hello AdiXfusion</h2>
<p>Write your HTML code here</p>
</textarea>

<br>

<button onclick="runCode()">Run Code</button>

<iframe id="preview"></iframe>

<script>
function runCode(){
var code=document.getElementById("code").value;
document.getElementById("preview").srcdoc=code;
}
</script>

</body>
</html>
