<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdiXfusion Developer</title>

<style>

body{
margin:0;
font-family:monospace;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:60px 20px;
}

h1{
font-size:60px;
color:#00ffff;
text-shadow:0 0 10px cyan,0 0 20px cyan,0 0 40px cyan;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px cyan;}
to{ text-shadow:0 0 40px cyan;}
}

.typing{
font-size:22px;
border-right:3px solid white;
white-space:nowrap;
overflow:hidden;
width:0;
margin:auto;
animation: typing 4s steps(30,end) forwards,blink 1s infinite;
}

@keyframes typing{
from{width:0}
to{width:320px}
}

@keyframes blink{
50%{border-color:transparent}
}

.section{
padding:50px 20px;
}

.card{
background:#1e293b;
margin:20px auto;
padding:25px;
max-width:300px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

footer{
padding:20px;
background:#020617;
}

button{
padding:12px 25px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>AdiXfusion</h1>

<p class="typing">Developer | App Creator | Tech Explorer</p>

<br>

<button>Welcome</button>

</header>

<div class="section">

<h2>About Me</h2>

<p>I am a developer exploring app development, AI and web technologies.</p>

</div>

<div class="section">

<h2>Projects</h2>

<div class="card">
<h3>Android Apps</h3>
<p>Modern mobile applications.</p>
</div>

<div class="card">
<h3>Web Development</h3>
<p>Creative responsive websites.</p>
</div>

<div class="card">
<h3>AI Experiments</h3>
<p>Future tech innovations.</p>
</div>

</div>

<footer>

<p>© 2026 AdiXfusion</p>

</footer>

</body>
</html>
