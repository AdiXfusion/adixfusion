<!DOCTYPE html>
<html>
<head>
<title>Hacker Terminal</title>
<style>
body{
background:black;
color:#00ff00;
font-family:monospace;
font-size:16px;
margin:0;
overflow:hidden;
}

#terminal{
padding:20px;
white-space:pre-line;
}

.cursor{
display:inline-block;
width:10px;
background:#00ff00;
margin-left:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>
const lines = [
"Initializing Hack Tool v3.4...",
"Connecting to remote server...",
"Bypassing firewall...",
"Accessing secure database...",
"Decrypting passwords...",
"IP Address Found: 192.168.0.23",
"Injecting exploit...",
"Downloading secret files...",
"System vulnerability detected...",
"Escalating privileges...",
"Root access granted!",
"Uploading payload...",
"Scanning network...",
"Compromising system..."
];

let terminal = document.getElementById("terminal");

function randomLine(){
return lines[Math.floor(Math.random()*lines.length)];
}

function typeLine(text){
let i = 0;
let line = document.createElement("div");
terminal.appendChild(line);

function typing(){
if(i < text.length){
line.innerHTML += text.charAt(i);
i++;
setTimeout(typing,30);
}else{
line.innerHTML += "<br>";
setTimeout(startTyping,200);
}
}
typing();
}

function startTyping(){
typeLine(randomLine());
terminal.scrollTop = terminal.scrollHeight;
}

startTyping();
</script>

</body>
</html>
