<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kali Linux Terminal</title>

<style>

body{
margin:0;
background:black;
color:#00ff00;
font-family:monospace;
overflow:hidden;
}

#terminal{
position:absolute;
top:20px;
left:20px;
z-index:2;
}

input{
background:black;
border:none;
color:#00ff00;
outline:none;
font-family:monospace;
}

canvas{
position:fixed;
top:0;
left:0;
}

#kali{
position:fixed;
top:10px;
right:20px;
color:#00ff00;
opacity:0.7;
}

#flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:red;
opacity:0;
z-index:5;
}

</style>

</head>

<body>

<div id="flash"></div>

<div id="kali">KALI LINUX ROOT TERMINAL</div>

<canvas id="matrix"></canvas>

<div id="terminal">
<p>root@kali:~# <input id="cmd" autofocus></p>
<pre id="out"></pre>
</div>

<script>

let c=document.getElementById("matrix");
let ctx=c.getContext("2d");

c.height=window.innerHeight;
c.width=window.innerWidth;

let letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
letters=letters.split("");

let fontSize=14;
let columns=c.width/fontSize;
let drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#0f0";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>c.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

let cmd=document.getElementById("cmd");
let out=document.getElementById("out");
let flash=document.getElementById("flash");

cmd.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let val=cmd.value.toLowerCase();

if(val==="ram"){

out.innerHTML+="Initializing RAM exploit...\n";

setTimeout(function(){

out.innerHTML+="Scanning network...\n";

},500);

setTimeout(function(){

let scan=setInterval(function(){

let ip="192.168."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255);

out.innerHTML+="Scanning IP "+ip+" ... OPEN\n";

window.scrollTo(0,document.body.scrollHeight);

},100);

setTimeout(function(){

clearInterval(scan);

out.innerHTML+="\nACCESS GRANTED ✔\n";

flash.style.opacity="0.7";

setTimeout(()=>{
flash.style.opacity="0";
},200);

setInterval(function(){

out.innerHTML+=
"Injecting payload...\n"+
"Bypassing firewall...\n"+
"Decrypting root password...\n"+
"Uploading exploit...\n"+
"Root access confirmed...\n\n";

},120);

},5000);

},1000);

}

else{

out.innerHTML+="command not found\n";

}

cmd.value="";

}

});

</script>

</body>
</html>
