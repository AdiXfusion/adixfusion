<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Strength Checker</title>
<style>
body{
  background:#0f0f0f; color:#fff; font-family:'Segoe UI', monospace; text-align:center; padding:50px;
}
h2{color:#00ff9c;}
input{
  padding:10px; font-size:16px; width:300px; border-radius:5px; border:none;
  margin-top:20px;
  background:#111; color:#fff;
}
.progress-container{
  width:320px; height:25px; background:#222; border-radius:5px; margin:20px auto;
}
.progress-bar{
  height:100%; width:0%; background:#ff3c3c; border-radius:5px; transition:width 0.3s ease;
}
.status-text{font-weight:bold; margin-top:10px; font-size:16px;}
</style>
</head>
<body>

<h2>Password Strength Checker</h2>
<input type="password" id="password" placeholder="Enter password">
<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div class="status-text" id="statusText">Start typing your password...</div>

<script>
const passwordInput = document.getElementById('password');
const progressBar = document.getElementById('progressBar');
const statusText = document.getElementById('statusText');

function calculateStrength(password){
  let strength = 0;

  // Criteria for hard password
  const hasLower = /[a-z]/.test(password);
  const hasUpper = /[A-Z]/.test(password);
  const hasNumber = /[0-9]/.test(password);
  const hasSpecial = /[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?]/.test(password);
  
  // Weak password
  if(password.length < 6) return {percent:10, status:"Weak", color:"#ff3c3c"};
  
  // Medium
  if(password.length >=6 && password.length < 10) strength += 25;
  if(hasLower && hasUpper) strength += 20;
  if(hasNumber) strength += 20;
  if(hasSpecial) strength += 15;

  // Hard
  if(password.length >= 10 && hasLower && hasUpper && hasNumber && hasSpecial){
    strength = 75 + (password.length>12 ? 25 : 0); // max 100%
  }

  if(strength < 50) return {percent:25, status:"Weak", color:"#ff3c3c"};
  if(strength >=50 && strength <75) return {percent:50, status:"Medium", color:"#ffcc00"};
  return {percent:strength, status:"Strong", color:"#00ff9c"};
}

// Animation
let animationId;
function animateBar(target){
  cancelAnimationFrame(animationId);
  let currentWidth = parseFloat(progressBar.style.width) || 0;

  function step(){
    if(currentWidth < target){
      currentWidth += 1;
      progressBar.style.width = currentWidth + "%";
      animationId = requestAnimationFrame(step);
    } else if(currentWidth > target){
      currentWidth -=1;
      progressBar.style.width = currentWidth + "%";
      animationId = requestAnimationFrame(step);
    }
  }
  step();
}

// Event listener
passwordInput.addEventListener('input',()=>{
  const pwd = passwordInput.value;
  const result = calculateStrength(pwd);
  animateBar(result.percent);
  progressBar.style.background = result.color;
  statusText.textContent = `${result.status} - ${result.percent}%`;
});
</script>

</body>
</html>
